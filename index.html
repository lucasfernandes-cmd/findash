<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinDash — Organização Financeira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#080d18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FinDash">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png">
</head>
<body>
  <div id="app">

    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">◈</div>
        <div class="logo-text">
          <span class="logo-brand">FinDash</span>
        </div>
      </div>

      <div class="mode-dropdown" id="modeDropdown">
        <button class="mode-dropdown-btn" onclick="toggleModeDropdown()">
          <span class="mode-dd-icon" id="modeDdIcon">🏢</span>
          <span class="mode-dd-label" id="modeDdLabel">Empresa</span>
          <span class="mode-dd-arrow">▾</span>
        </button>
        <div class="mode-dropdown-menu hidden" id="modeDropdownMenu">
          <button class="mode-dd-option active" id="ddOptEmpresa" onclick="setMode('empresa')">
            <span>🏢</span> Empresa
          </button>
          <button class="mode-dd-option" id="ddOptPessoal" onclick="setMode('pessoal')">
            <span>👤</span> Pessoal
          </button>
        </div>
      </div>

      <div class="header-meta">
        <button class="profile-btn" onclick="openModal('profile')" title="Perfil e configurações">
          <span id="profileInitials">👤</span>
        </button>
        <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
          <span id="themeIcon">☀️</span>
        </button>
        <div class="current-date" id="currentDate"></div>
      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="main">
      <!-- Summary Metrics -->
      <section id="summarySection" class="summary-grid"></section>

      <!-- Dashboard Sections -->
      <div id="dashboardContent" class="dashboard-sections"></div>
    </main>

    <!-- ===== BOTTOM TAB BAR ===== -->
    <nav class="tab-bar" id="tabBar">
      <button class="tab-btn active" id="tabHome" onclick="setTab('home')">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">Home</span>
      </button>
      <button class="tab-btn" id="tabGastos" onclick="setTab('gastos')">
        <span class="tab-icon">📊</span>
        <span class="tab-label">Gastos</span>
      </button>
      <button class="tab-btn tab-btn-novo" id="tabNovo" onclick="toggleNovoMenu()">
        <span class="tab-icon-novo">+</span>
        <span class="tab-label">Novo</span>
      </button>
      <button class="tab-btn" id="tabMetas" onclick="setTab('metas')">
        <span class="tab-icon">🎯</span>
        <span class="tab-label">Metas</span>
      </button>
      <button class="tab-btn" id="tabIA" onclick="setTab('ia')">
        <span class="tab-icon">🤖</span>
        <span class="tab-label">IA</span>
      </button>
    </nav>

    <!-- ===== NOVO QUICK-ACTION MENU ===== -->
    <div class="novo-menu-overlay hidden" id="novoMenuOverlay" onclick="closeNovoMenu()">
      <div class="novo-menu" onclick="event.stopPropagation()">
        <button class="novo-menu-item" onclick="closeNovoMenu();openNovaCompra()">
          <span class="novo-menu-icon">🛒</span> Nova Compra
        </button>
        <button class="novo-menu-item" onclick="closeNovoMenu();openModal('transacao',state.activeMode)">
          <span class="novo-menu-icon">🔄</span> Nova Transação
        </button>
        <button class="novo-menu-item" onclick="closeNovoMenu();openModal('conta',state.activeMode)">
          <span class="novo-menu-icon">📤</span> Nova Conta a Pagar
        </button>
        <button class="novo-menu-item" onclick="closeNovoMenu();openModal('divida',state.activeMode)">
          <span class="novo-menu-icon">🔗</span> Nova Dívida
        </button>
        <button class="novo-menu-item" onclick="closeNovoMenu();openModal('receber',state.activeMode)">
          <span class="novo-menu-icon">📥</span> Novo A Receber
        </button>
      </div>
    </div>

  </div>

  <!-- ===== ADD/EDIT MODAL ===== -->
  <div class="overlay hidden" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Adicionar</h2>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitModal()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ===== DETAIL MODAL (Extrato / Compras) ===== -->
  <div class="overlay hidden" id="detailOverlay" onclick="handleDetailOverlayClick(event)">
    <div class="modal modal-wide" id="detailModal">
      <div class="modal-header">
        <h2 class="modal-title" id="detailTitle">Extrato</h2>
        <button class="icon-btn" onclick="closeDetail()">✕</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- ===== CONFIRM MODAL (genérico) ===== -->
  <div class="overlay hidden" id="confirmOverlay" onclick="handleConfirmOverlayClick(event)">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">Confirmar</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMsg">Tem certeza?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeConfirm()">Cancelar</button>
        <button class="btn btn-danger" id="confirmBtn" onclick="execConfirm()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ===== PROMPT MODAL (substitui prompt() nativo) ===== -->
  <div class="overlay hidden" id="promptOverlay" onclick="handlePromptOverlayClick(event)">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="promptTitle">Valor</h2>
      </div>
      <div class="modal-body">
        <p id="promptMsg" style="margin-bottom:12px;font-size:13px;color:var(--text-secondary)"></p>
        <input class="form-input" id="promptInput" type="text" inputmode="decimal"
          data-monetary="true" placeholder="0,00"
          oninput="handleMoneyInput(this)" autocomplete="off">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closePrompt()">Cancelar</button>
        <button class="btn btn-primary" id="promptBtn" onclick="execPrompt()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST CONTAINER ===== -->
  <div id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('SW registered:', reg.scope);
        // Detecta quando novo SW é instalado
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                // Novo SW ativou e já havia um SW anterior — recarregar
                window.location.reload();
              }
            });
          }
        });
      }).catch(err => console.error('SW registration failed:', err));

      // Auto-reload quando novo SW assume controle
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
